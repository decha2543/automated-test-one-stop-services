name: automated-test-one-stop-service-server

services:
  influxdb:
    container_name: influxdb
    image: influxdb:1.12.2
    ports:
      - "8086:8086"
    networks:
      - shared-network
    volumes:
      - influxdb-data:/var/lib/influxdb
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    networks:
      - shared-network
    volumes:
      - ./tools/k6/resources/src/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    environment:
      # Local development only — do not use these credentials in production
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

networks:
  shared-network:
    external: true

volumes:
  influxdb-data:
  grafana-data:
